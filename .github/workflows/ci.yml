name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '24'

    - name: Install Clojure Tools
      uses: DeLaGuardo/setup-clojure@12.3
      with:
        bb: latest
        cli: latest

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.m2/repository
          ~/.gitlibs
          ~/.deps.clj
          ~/.clojure
          ~/.cpcache
        key: ${{ runner.os }}-deps-${{ hashFiles('deps.edn') }}
        restore-keys: |
          ${{ runner.os }}-deps-

    - name: Run Tests
      run: |
        cd $GITHUB_WORKSPACE
        clojure -M:test

    - name: Run Linter
      continue-on-error: true
      run: |
        cd $GITHUB_WORKSPACE
        clojure -M:lint